spring.application.name=backend-contrastiq

# --- Base de datos (ajustar segun ambiente) ---
spring.datasource.url=jdbc:mysql://localhost:3307/contrast_iq?useSSL=false&serverTimezone=America/Mexico_City
spring.datasource.username=coofix
spring.datasource.password=Genius311085#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# El esquema ya se crea con schema_contrast_iq.sql; no dejar que
# Hibernate lo modifique automaticamente en un entorno hospitalario.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8080

# Origenes permitidos para las llamadas desde Angular (lista separada por
# comas, admite patrones con "*"). Cubre localhost y los rangos tipicos de
# red local (192.168.x.x / 10.x.x.x) para poder probar desde otra maquina
# o celular en la misma red sin tener que listar cada IP.
app.cors.origenes-permitidos=http://localhost:4200,http://127.0.0.1:4200,http://192.168.*.*:4200,http://10.*.*.*:4200

# --- Autenticacion: JWT Bearer directo (sin redirect ni doble pantalla) ---
# El login vive en una llamada REST (POST /api/auth/login): el backend
# valida usuario/contrasena y firma el access token aqui mismo con una
# llave RSA persistida en disco (ver JwtSecurityConfig). El refresh token
# es opaco y vive en la tabla tokens_refresco, para poder revocarse de
# verdad (logout, o si se compromete).
#
# PERSISTENCIA DE LA LLAVE (Prioridad 2, resuelta): la llave RSA ya no se
# genera en memoria en cada arranque -- se guarda en app.jwt.llave-directorio
# la primera vez, y en arranques siguientes se lee de ahi. Un reinicio del
# backend YA NO invalida los access tokens emitidos antes (mientras sigan
# dentro de su ventana de expiracion). Ese directorio contiene material
# criptografico real (equivalente a una contrasena): agregarlo al
# .gitignore del backend, y en un despliegue real evaluar moverlo a un
# volumen persistente / secret manager en vez de disco local.
app.jwt.llave-directorio=./keys
app.jwt.issuer=contrast-iq
app.jwt.access-token-minutos=1
app.jwt.refresh-token-dias=7

# --- Envio de correo (recuperacion de contrasena) ---
# Mientras no se configuren credenciales SMTP reales, EmailService solo
# registra el enlace de recuperacion en el log (ver EmailService.java).
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=CAMBIAR_CORREO
spring.mail.password=CAMBIAR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.correo.envio-habilitado=false
app.correo.remitente=no-responder@contrast-iq.mx
app.frontend.url-base=http://localhost:4200

# --- Integracion clinica: HIS ---
# Mientras no se confirme con el hospital cual es el HIS y su protocolo
# de integracion (HL7 v2, FHIR, etc.), HisIntegracionServiceSimulado
# devuelve los datos ya existentes localmente, marcados como
# "simulado". Cuando se confirme el protocolo real, se implementa una
# nueva clase (ver la interfaz HisIntegracionService) y se activa aqui.
app.his.habilitado=false
app.his.base-url=CAMBIAR_URL_DEL_HIS
app.his.api-key=CAMBIAR_API_KEY_DEL_HIS

# --- Integracion clinica: sincronizacion real con el inyector ---
# Segun el manual de EmpowerCTA, la integracion real es via exportacion
# periodica de la IRiS Workstation (archivo), no un stream en tiempo
# real. Mientras no se confirme el formato exacto del archivo que
# exporta la IRiS Workstation de este hospital, queda deshabilitada por
# defecto; el formato CSV que se importa hoy es una referencia inicial
# (ver SincronizacionInyectorService.java).
app.sincronizacion.habilitada=false
app.sincronizacion.carpeta=./importaciones-iris

